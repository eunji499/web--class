<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탭 메뉴</title>
    <link rel="stylesheet" href="./css/ex3.css">
    <script src="./js/ex3.js"></script>
</head>
<body>
    <div class="tab-menu">
        <div class="tabs">
            <span class="active">반가워요!</span>
            <span>맛있는에너지</span>
            <span>오늘의 즐거움</span>
            <span>우리의 바이브</span>
            <span>여기서 만나요</span>
        </div>
        <div class="tab-descriptions">
            <section class="active">
                <h2>반가워요!</h2>
                <p >여러분을 환영합니다! 이곳은 즐거움과 에너지가 가득한 공간입니다. 함께 좋은 시간을 보내요!</p>
            </section>
            <section>
                <h2>맛있는에너지</h2>
                <p>맛있는 음식으로 에너지를 충전하세요! 다양한 맛있는 메뉴를 만나보세요.</p>
            </section>
            <section>
                <h2>오늘의 즐거움</h2>
                <p>오늘 하루를 더욱 즐겁게 만들어줄 특별한 이벤트와 활동을 소개합니다.</p>
            </section>
            <section>
                <h2>우리의 바이브</h2>
                <p>함께하는 시간이 소중한 우리들의 이야기를 나누는 공간입니다.</p>
            </section>
            <section>
                <h2>여기서 만나요</h2>
                <p>여러분과 함께할 수 있는 다양한 모임과 활동을 만나보세요.</p>
            </section>
        </div>
    </div>
</body>
</html>
