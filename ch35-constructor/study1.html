<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생성자 함수</title>

</head>
<body>
    <h1>생성자 함수</h1>
    <p>생성자 함수란? 객체를 생성하는 함수를 뜻한다.</p>
    <script>
        function Person(uname,uage){
            this.name = uname
            this.age = uage
            this.sayHello = function(){
                alert(`안녕하세요 저는 ${this.name}입니다.`)
            }

        
        }
        let Person1 = new Person("케찹",24) // -- 아래코드 축약버전
        // let Person1 = {
        //     name : "케찹",
        //     age:24,
        //     sayHello:function(){alert(`안녕하세요 저는 케찹입니다.`)}
        // }
        let Person2 = new Person("냐미",29)
        Person1.sayHello()
        Person2.sayHello()

    </script>
</body>
</html>
