<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>값의 형태로 정의하는 함수</title>
</head>
<body>
    <script>
        a()  //함수 선언문은 호이스팅이 일어나서 함수 선언문보다 먼저 호출해도 된다.
        function a(){
            alert("aaa")
        }   //함수 선언문

        let b = function(){
            alert("bbb")
        }  //익명 함수
        b()

       // c()  
       //함수 표현식은 호이스팅이 일어나지 않아서 함수 표현식보다 먼저 호출하면 에러가 난다.
        let c = ()=>{
            alert("ccc")
        }
        c()

        function d(n1){
            alert(n1)
                let d = 4;
        }  
        d("ddd")

        let e = function(n1){
            alert(n1)
        }
        e("eee")

        let f = n1=>{
            alert(n1)
        } // 맥의 변수가 하나일때는 소괄호 생략 가능
        f("fff")

        let g = (a,b)=>a+b // 함수의 몸체가 표현식 하나로 이루어져 있으면 중괄호와 return 생략 가능
        alert(g(1,3))
    </script>


    <h1>콜백함수</h1>
    <!-- 콜백함수는 다른 함수의 매개변수로 전달되는 함수를 말한다. -->
    <script>
        function aa(bb){
            bb()
        }
        //aa() 
        //함수 aa는 매개변수 bb를 받아서 bb()를 실행하는 함수이다. 하지만 aa()를 호출할 때 매개변수 bb에 아무것도 전달하지 않았기 때문에 에러가 발생한다.
        
        aa(function(){}) //함수 aa는 매개변수 bb를 받아서 bb()를 실행하는 함수이다. aa()를 호출할 때 매개변수 bb에 익명 함수를 전달했기 때문에 에러가 발생하지 않고 익명 함수가 실행된다.
        
        aa(function(){
            alert("TT")
        }) //함수 aa는 매개변수 bb를 받아서 bb()를 실행하는 함수이다. aa()를 호출할 때 매개변수 bb에 익명 함수를 전달했기 때문에 에러가 발생하지 않고 익명 함수가 실행되어 "TT"라는 알림창이 뜬다.
        
       let cc = dd=>{
            dd()
       }
       cc(()=>{
            alert("dd")
       }) 
    </script>
</body>
</html>
